name: Build and Release
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Version"]
    types: [completed]
  push:
    tags:
      - '*'

jobs:
  build:
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-artifact
            build_target: electron
          - os: windows-latest
            artifact: windows-artifact
            build_target: electron
          - os: macos-latest
            artifact: macos-artifact
            build_target: electron
          - os: macos-latest
            artifact: macos-native-artifact
            build_target: native-macos
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./tooling/github/setup

      - name: Build workspace packages
        run: bun run build

      - name: Export menu-bar web bundle
        if: matrix.build_target == 'electron'
        run: bun run export:web
        working-directory: apps/menu-bar

      - name: Install electron node modules
        if: matrix.build_target == 'electron'
        run: bun install --frozen-lockfile
        working-directory: apps/menu-bar/electron

      - name: Build electron app
        if: matrix.build_target == 'electron'
        run: bun run make
        working-directory: apps/menu-bar/electron

      - name: Install Pods (React Native iOS)
        if: matrix.build_target == 'native-macos'
        run: bunx pod-install
        working-directory: apps/menu-bar

      - name: Build native macOS app (React Native macOS)
        if: matrix.build_target == 'native-macos'
        run: >
          xcodebuild
          -workspace ./macos/TrayLink.xcworkspace
          -scheme TrayLink-macOS
          -configuration Release
          -derivedDataPath ./macos/build
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=
        working-directory: apps/menu-bar

      - name: Package native macOS app for Homebrew
        if: matrix.build_target == 'native-macos'
        run: |
          set -euo pipefail

          APP_DIR="./macos/build/Build/Products/Release"
          APP_NAME="Tray Link.app"
          ZIP_NAME="Tray-Link-macOS-universal.zip"

          if [ ! -d "${APP_DIR}/${APP_NAME}" ]; then
            echo "Missing app bundle at ${APP_DIR}/${APP_NAME}"
            exit 1
          fi

          rm -f "${APP_DIR}/${ZIP_NAME}"
          ditto -c -k --sequesterRsrc --keepParent "${APP_DIR}/${APP_NAME}" "${APP_DIR}/${ZIP_NAME}"
        working-directory: apps/menu-bar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.build_target == 'native-macos' && 'apps/menu-bar/macos/build/Build/Products/Release/Tray-Link-macOS-universal.zip' || '' }}
            ${{ matrix.build_target == 'electron' && 'apps/menu-bar/electron/out/make/**/*.deb' || '' }}
            ${{ matrix.build_target == 'electron' && 'apps/menu-bar/electron/out/make/**/*.rpm' || '' }}
            ${{ matrix.build_target == 'electron' && 'apps/menu-bar/electron/out/make/**/*.exe' || '' }}
            ${{ matrix.build_target == 'electron' && 'apps/menu-bar/electron/out/make/**/*.nupkg' || '' }}
            ${{ matrix.build_target == 'electron' && 'apps/menu-bar/electron/out/make/**/*.zip' || '' }}

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Resolve tags and commit range
        id: git_range
        run: |
          set -euo pipefail

          current_tag=$(git tag --sort=-creatordate | head -n1 || true)

          if [ -z "${current_tag}" ]; then
            echo "No git tags found in repository."
            exit 1
          fi

          previous_tag=$(git tag --sort=-creatordate | grep -v "^${current_tag}$" | head -n1 || true)

          echo "current_tag=${current_tag}" >> "$GITHUB_OUTPUT"

          if [ -n "${previous_tag}" ]; then
            echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"
            echo "range=${previous_tag}..${current_tag}" >> "$GITHUB_OUTPUT"
          else
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
            echo "range=${current_tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release changelog input
        id: changelog
        run: |
          set -euo pipefail

          if [ -n "${{ steps.git_range.outputs.previous_tag }}" ]; then
            git log --pretty='- %s (%h)' "${{ steps.git_range.outputs.range }}" > commits.md
          else
            git log --pretty='- %s (%h)' -n 30 "${{ steps.git_range.outputs.current_tag }}" > commits.md
          fi

          if [ ! -s commits.md ]; then
            echo "- No user-facing commits found." > commits.md
          fi

      - name: Generate release notes
        run: |
          set -euo pipefail

          previous_tag="${{ steps.git_range.outputs.previous_tag }}"
          if [ -z "${previous_tag}" ]; then
            previous_tag="N/A"
          fi

          if [ -n "${GEMINI_API_KEY}" ]; then
            commits_payload=$(cat commits.md)

            jq -n \
              --arg current_tag "${{ steps.git_range.outputs.current_tag }}" \
              --arg previous_tag "${previous_tag}" \
              --arg commits "${commits_payload}" \
              '{
                contents: [
                  {
                    role: "user",
                    parts: [
                      {
                        text: ("You generate concise GitHub release notes in markdown. Group notable changes into sections and keep it practical for users.\n\nCurrent tag: " + $current_tag + "\nPrevious tag: " + $previous_tag + "\n\nCommits:\n" + $commits + "\n\nOutput only markdown release notes.")
                      }
                    ]
                  }
                ]
              }' > ai_payload.json

            curl -sS "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d @ai_payload.json > ai_response.json

            jq -r '[.candidates[0].content.parts[]?.text] | join("\n") // empty' ai_response.json > release_notes.md
          fi

          if [ ! -s release_notes.md ]; then
            {
              echo "# 🎁 Release notes (${{ steps.git_range.outputs.current_tag }})"
              echo
              echo "## Changes"
              cat commits.md
              echo
              echo "## Metadata"
              echo "- Current tag: ${{ steps.git_range.outputs.current_tag }}"
              echo "- Previous tag: ${previous_tag}"
            } > release_notes.md
          fi

      - name: Prepare final release assets
        run: |
          set -euo pipefail

          mkdir -p final-assets

          while IFS= read -r -d '' file; do
            cp "$file" final-assets/
          done < <(find release-artifacts -type f \( \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.exe' -o \
            -name '*.nupkg' -o \
            -name '*.zip' -o \
            -name '*.app' -o \
            -name '*.pkg' \
          \) -print0)

          echo "Selected release assets:"
          find final-assets -type f -maxdepth 1 -print | sed 's#^# - #' || true

          if [ -z "$(find final-assets -type f -print -quit)" ]; then
            echo "No distributable assets found in release-artifacts."
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.git_range.outputs.current_tag }}
          body_path: release_notes.md
          files: |
            final-assets/*
