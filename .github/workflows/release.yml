name: Build and Release
on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-artifact
          - os: windows-latest
            artifact: windows-artifact
          - os: macos-latest
            artifact: macos-artifact
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./tooling/github/setup

      - name: Build workspace packages
        run: bun run build

      - name: Export menu-bar web bundle
        run: bun run export:web
        working-directory: apps/menu-bar

      - name: Install electron node modules
        run: bun install --frozen-lockfile
        working-directory: apps/menu-bar/electron

      - name: Build electron app
        run: bun run make
        working-directory: apps/menu-bar/electron

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/menu-bar/electron/out

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    env:
      CURRENT_TAG: ${{ github.ref_name }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Resolve previous tag and commit range
        id: git_range
        run: |
          set -euo pipefail

          previous_tag=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n1 || true)

          if [ -n "${previous_tag}" ]; then
            echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"
            echo "range=${previous_tag}..${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
            echo "range=${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release changelog input
        id: changelog
        run: |
          set -euo pipefail

          if [ -n "${{ steps.git_range.outputs.previous_tag }}" ]; then
            git log --pretty='- %s (%h)' "${{ steps.git_range.outputs.range }}" > commits.md
          else
            git log --pretty='- %s (%h)' -n 30 "${CURRENT_TAG}" > commits.md
          fi

          if [ ! -s commits.md ]; then
            echo "- No user-facing commits found." > commits.md
          fi

      - name: Generate release notes
        run: |
          set -euo pipefail

          previous_tag="${{ steps.git_range.outputs.previous_tag }}"
          if [ -z "${previous_tag}" ]; then
            previous_tag="N/A"
          fi

          if [ -n "${GEMINI_API_KEY}" ]; then
            commits_payload=$(cat commits.md)

            jq -n \
              --arg current_tag "${CURRENT_TAG}" \
              --arg previous_tag "${previous_tag}" \
              --arg commits "${commits_payload}" \
              '{
                contents: [
                  {
                    role: "user",
                    parts: [
                      {
                        text: ("You generate concise GitHub release notes in markdown. Group notable changes into sections and keep it practical for users.\n\nCurrent tag: " + $current_tag + "\nPrevious tag: " + $previous_tag + "\n\nCommits:\n" + $commits + "\n\nOutput only markdown release notes.")
                      }
                    ]
                  }
                ]
              }' > ai_payload.json

            curl -sS "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d @ai_payload.json > ai_response.json

            jq -r '[.candidates[0].content.parts[]?.text] | join("\n") // empty' ai_response.json > release_notes.md
          fi

          if [ ! -s release_notes.md ]; then
            {
              echo "# 🎁 Release notes (${CURRENT_TAG})"
              echo
              echo "## Changes"
              cat commits.md
              echo
              echo "## Metadata"
              echo "- Current tag: ${CURRENT_TAG}"
              echo "- Previous tag: ${previous_tag}"
            } > release_notes.md
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            release-artifacts/**/*
