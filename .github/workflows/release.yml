name: Build
on:
  workflow_dispatch:
  push:
    tags:
      - 'tray-link-v*'
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-artifact
          - os: windows-latest
            artifact: windows-artifact
          - os: macos-latest
            artifact: macos-artifact
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./tooling/github/setup

      - name: Build workspace packages
        run: bun run build

      - name: Export menu-bar web bundle
        run: bun run export:web
        working-directory: apps/menu-bar

      - name: Build electron app
        run: bun run make
        working-directory: apps/menu-bar/electron

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/menu-bar/electron/out
